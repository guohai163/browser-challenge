services:
  spring-app:
    image: ghcr.io/guohai163/browser-challenge:latest
    container_name: browser-challenge-spring
    expose:
      - "8080"
    ports:
      - "8080:8080"
    restart: unless-stopped
  envoy:
    image: ghcr.io/guohai163/browser-challenge-envoy:latest
    container_name: browser-challenge-envoy
    depends_on:
      spring-app:
        condition: service_started
    volumes:
      - ./script/certs:/etc/envoy/certs:ro
    ports:
      - "443:443"
      - "9901:9901"
    restart: unless-stopped
