admin:
  access_log_path: /tmp/admin_access.log
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901

static_resources:
  listeners:
    - name: https_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 443
      listener_filters:
        # 必须先解析 HAProxy PROXY v2
        - name: envoy.filters.listener.proxy_protocol
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.listener.proxy_protocol.v3.ProxyProtocol
        # 再做 TLS 指纹探测
        - name: envoy.filters.listener.tls_inspector
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.listener.tls_inspector.v3.TlsInspector
            enable_ja3_fingerprinting: true
            enable_ja4_fingerprinting: true

      filter_chains:
        - transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
              common_tls_context:
                alpn_protocols: ["h2", "http/1.1"]
                tls_certificates:
                  - certificate_chain:
                      filename: /etc/envoy/certs/fullchain.pem
                    private_key:
                      filename: /etc/envoy/certs/privkey.pem

          filters:
            # Extract real downstream H2 fingerprint fields into dynamic metadata:
            # namespace=gydev.h2, keys=fp/settings/window/priority.
            - name: envoy.filters.network.wasm
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.wasm.v3.Wasm
                config:
                  name: h2_fingerprint_extractor
                  root_id: h2_fingerprint_extractor
                  vm_config:
                    vm_id: h2_fingerprint_vm
                    runtime: envoy.wasm.runtime.v8
                    code:
                      local:
                        filename: /etc/envoy/plugins/h2_fp.wasm
                    allow_precompiled: true
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_https
                codec_type: AUTO
                use_remote_address: true
                xff_num_trusted_hops: 0
                access_log:
                  - name: envoy.access_loggers.stdout
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                      log_format:
                        json_format:
                          method: "%REQ(:METHOD)%"
                          path: "%REQ(:PATH)%"
                          protocol: "%PROTOCOL%"
                          upstream_cluster: "%UPSTREAM_CLUSTER%"
                          ja3: "%REQ(X-JA3)%"
                          ja3_raw: "%REQ(X-JA3-RAW)%"
                          ja3_normalized: "%REQ(X-JA3-NORMALIZED)%"
                          ja3_md5_normalized: "%REQ(X-JA3-NORMALIZED-MD5)%"
                          ja3_raw_meta: "%TLS_JA3_RAW%"
                          ja3_normalized_meta: "%TLS_JA3_NORMALIZED%"
                          ja3_md5_normalized_meta: "%TLS_JA3_NORMALIZED_MD5%"
                          ja4: "%REQ(X-JA4)%"
                          h2_fp: "%REQ(X-H2-FP)%"
                          h2_settings: "%REQ(X-H2-SETTINGS)%"
                          h2_window: "%REQ(X-H2-WINDOW)%"
                          h2_priority: "%REQ(X-H2-PRIORITY)%"
                          h2_fp_meta: "%DYNAMIC_METADATA(gydev.h2:fp)%"
                          h2_settings_meta: "%DYNAMIC_METADATA(gydev.h2:settings)%"
                          h2_window_meta: "%DYNAMIC_METADATA(gydev.h2:window)%"
                          h2_priority_meta: "%DYNAMIC_METADATA(gydev.h2:priority)%"

                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: backend
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          route:
                            cluster: nginx_upstream

                      request_headers_to_add:
                        - header:
                            key: X-JA3
                            value: "%TLS_JA3_FINGERPRINT%"
                          append_action: OVERWRITE_IF_EXISTS_OR_ADD
                        - header:
                            key: X-JA3-NORMALIZED-MD5
                            value: "%TLS_JA3_NORMALIZED_MD5%"
                          append_action: OVERWRITE_IF_EXISTS_OR_ADD
                        - header:
                            key: X-JA3-RAW
                            value: "%TLS_JA3_RAW%"
                          append_action: OVERWRITE_IF_EXISTS_OR_ADD
                        - header:
                            key: X-JA3-NORMALIZED
                            value: "%TLS_JA3_NORMALIZED%"
                          append_action: OVERWRITE_IF_EXISTS_OR_ADD
                        - header:
                            key: X-JA4
                            value: "%TLS_JA4_FINGERPRINT%"
                          append_action: OVERWRITE_IF_EXISTS_OR_ADD

                http_filters:
                  - name: envoy.filters.http.wasm
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.wasm.v3.Wasm
                      config:
                        name: h2_fingerprint_injector
                        root_id: h2_fingerprint_injector
                        vm_config:
                          vm_id: h2_fingerprint_vm
                          runtime: envoy.wasm.runtime.v8
                          code:
                            local:
                              filename: /etc/envoy/plugins/h2_fp.wasm
                          allow_precompiled: true
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: nginx_upstream
      connect_timeout: 3s
      type: STRICT_DNS
      load_assignment:
        cluster_name: nginx_upstream
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: spring-app
                      port_value: 8080
